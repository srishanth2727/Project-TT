<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <style>
    .title { font: bold 26px Arial; fill: #1f2937 }
    .subtitle { font: 14px Arial; fill: #374151 }
    .box { fill: #f8fafc; stroke: #0f172a; stroke-width:1.5 }
    .section { fill: #111827; fill-opacity: 0.02 }
    .hdr { font: bold 14px Arial; fill: #0f172a }
    .small { font: 12px Arial; fill: #0f172a }
    .muted { font: 11px Arial; fill: #6b7280 }
    .pill { rx:6; ry:6; fill: #e6f4ff; stroke:#60a5fa }
    .arrow { stroke:#0f172a; stroke-width:2; fill:none; marker-end:url(#arrowhead) }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="30" y="40" class="title">Smart Notes (Spring Boot + Java Full Stack) — Architecture</text>
  <text x="30" y="64" class="muted">Prototype diagram generated for this project</text>

  <!-- UI Screens (left) -->
  <rect x="30" y="90" width="420" height="190" class="section" />
  <text x="40" y="116" class="hdr">UI Screens</text>

  <!-- Login card -->
  <rect x="40" y="130" width="120" height="120" class="box" rx="6"/>
  <text x="52" y="155" class="small">Login Page</text>
  <rect x="60" y="170" width="80" height="12" fill="#fff" stroke="#d1d5db" rx="3"/>
  <rect x="60" y="190" width="80" height="12" fill="#fff" stroke="#d1d5db" rx="3"/>
  <rect x="80" y="212" width="40" height="16" fill="#2563eb" rx="4"/>
  <text x="92" y="224" font-size="12" fill="#fff">Login</text>

  <!-- Dashboard cards -->
  <rect x="172" y="130" width="120" height="120" class="box" rx="6"/>
  <text x="188" y="155" class="small">Dashboard</text>
  <rect x="192" y="170" width="80" height="12" fill="#fff" stroke="#d1d5db" rx="3"/>
  <rect x="192" y="190" width="30" height="12" fill="#d1fae5" stroke="#10b981" rx="3"/>

  <!-- Add/Edit Note -->
  <rect x="304" y="130" width="120" height="120" class="box" rx="6"/>
  <text x="320" y="155" class="small">Add / Edit Note</text>
  <rect x="320" y="170" width="80" height="12" fill="#fff" stroke="#d1d5db" rx="3"/>
  <rect x="320" y="190" width="40" height="12" fill="#fff" stroke="#d1d5db" rx="3"/>

  <!-- Backend Structure (right) -->
  <rect x="480" y="90" width="420" height="190" class="section" />
  <text x="490" y="116" class="hdr">Backend Structure (MVC)</text>

  <!-- Controller box -->
  <rect x="500" y="130" width="380" height="44" fill="#ffedd5" stroke="#fb923c" rx="6"/>
  <text x="520" y="158" class="small">Controller Layer — NoteController, AuthController</text>

  <!-- Service box -->
  <rect x="500" y="180" width="380" height="44" fill="#dbeafe" stroke="#60a5fa" rx="6"/>
  <text x="520" y="208" class="small">Service Layer — NoteService, AuthService</text>

  <!-- Repository box -->
  <rect x="500" y="230" width="380" height="44" fill="#dcfce7" stroke="#10b981" rx="6"/>
  <text x="520" y="258" class="small">Repository Layer — NoteRepository, UserRepository</text>

  <!-- Database Design (lower-left) -->
  <rect x="30" y="310" width="420" height="210" class="section" />
  <text x="40" y="334" class="hdr">Database Design</text>

  <!-- Users table -->
  <rect x="50" y="360" width="180" height="120" class="box" rx="6"/>
  <text x="62" y="384" class="small">Users Table</text>
  <text x="62" y="404" class="muted">id | name | email | password</text>
  <text x="62" y="422" class="muted">(example types: Long, String, String)</text>

  <!-- Notes table -->
  <rect x="260" y="360" width="180" height="120" class="box" rx="6"/>
  <text x="284" y="384" class="small">Notes Table</text>
  <text x="274" y="404" class="muted">id | title | description | tags | user_id</text>
  <text x="274" y="422" class="muted">(relationships: ManyToOne -> User)</text>

  <!-- Optional version table -->
  <rect x="30" y="490" width="420" height="84" class="box" rx="6"/>
  <text x="46" y="514" class="small">Optional Version Table</text>
  <text x="46" y="532" class="muted">id | note_id | old_description | modified_at</text>

  <!-- Architecture Overview / Flow (lower-right center) -->
  <rect x="480" y="330" width="640" height="300" class="section" />
  <text x="490" y="354" class="hdr">Architecture Overview</text>

  <!-- REST API box -->
  <rect x="560" y="380" width="220" height="56" class="box" rx="6"/>
  <text x="588" y="414" class="small">REST API — Spring Boot</text>

  <!-- Spring Security & JWT -->
  <rect x="810" y="380" width="240" height="56" fill="#fff7ed" stroke="#f59e0b" rx="6"/>
  <text x="836" y="414" class="small">Spring Security & JWT</text>

  <!-- Service layer -->
  <rect x="560" y="460" width="480" height="48" fill="#f0f9ff" stroke="#60a5fa" rx="6"/>
  <text x="582" y="492" class="small">Service Layer → JPA Repository Layer → Database</text>

  <!-- MySQL cylinder (represented) -->
  <g>
    <ellipse cx="1160" cy="540" rx="60" ry="18" fill="#111827" fill-opacity="0.08" stroke="#111827"/>
    <rect x="1100" y="540" width="120" height="72" rx="8" fill="#111827" fill-opacity="0.06" stroke="#111827"/>
    <ellipse cx="1160" cy="612" rx="60" ry="18" fill="#111827" fill-opacity="0.08" stroke="#111827"/>
    <text x="1128" y="582" class="small">MySQL / Postgres</text>
  </g>

  <!-- Arrows connecting boxes -->
  <path d="M680 408 L800 408" class="arrow" />
  <path d="M1050 408 L1130 408" class="arrow" />
  <path d="M820 432 L820 460 L1040 460" class="arrow" />
  <path d="M1040 508 L1120 560" class="arrow" />

  <!-- System Flow (right column) -->
  <rect x="1140" y="90" width="220" height="190" class="section" />
  <text x="1150" y="116" class="hdr">System Flow</text>
  <text x="1160" y="140" class="muted">1. User Registration</text>
  <text x="1160" y="160" class="muted">2. User Login (JWT Auth)</text>
  <text x="1160" y="180" class="muted">3. Create / Manage Notes</text>
  <text x="1160" y="200" class="muted">4. CRUD Operations</text>

  <!-- Footer / Notes -->
  <text x="30" y="830" class="muted">Note: Diagram is a high-level overview—boxes correspond to project packages like controller/, service/, repository/, model/, util/ in this repository.</text>

</svg>